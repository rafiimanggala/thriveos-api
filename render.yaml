services:
  - type: web
    name: thriveos-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NODE_ENV
        sync: false
